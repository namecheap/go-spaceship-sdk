name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify module integrity
        run: go mod verify

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Build
        run: make build

      - name: Vet
        run: make vet

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          install-mode: goinstall

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: make test

  acceptance:
    name: Acceptance Tests
    needs: [check, lint, test]
    runs-on: ubuntu-latest
    # Live tests hit the real Spaceship API and mutate DNS on SPACESHIP_TEST_DOMAIN.
    # Skip feature-branch pushes (the PR run covers them); run on PRs, pushes to
    # main, and manual dispatch. Forks without secrets no-op via the gate below.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    # Serialize live runs so two workflows never mutate the shared test domain
    # at once. Do not cancel an in-progress run — it may be mid-cleanup.
    concurrency:
      group: acceptance-tests
      cancel-in-progress: false
    steps:
      # The API credentials are secrets (unavailable on fork PRs); the test
      # domain is a plain repository variable so it is visible and easy to
      # update in the Actions UI. Gate every subsequent step on all three
      # being present so the job stays green (a no-op) rather than failing
      # when it cannot authenticate.
      - name: Check acceptance configuration
        id: acc_secrets
        env:
          SPACESHIP_API_KEY: ${{ secrets.SPACESHIP_API_KEY }}
          SPACESHIP_API_SECRET: ${{ secrets.SPACESHIP_API_SECRET }}
          SPACESHIP_TEST_DOMAIN: ${{ vars.SPACESHIP_TEST_DOMAIN }}
        run: |
          if [ -n "$SPACESHIP_API_KEY" ] && [ -n "$SPACESHIP_API_SECRET" ] && [ -n "$SPACESHIP_TEST_DOMAIN" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false; skipping live acceptance tests" >&2
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.acc_secrets.outputs.has_secrets == 'true' }}

      - name: Set up Go
        if: ${{ steps.acc_secrets.outputs.has_secrets == 'true' }}
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Acceptance tests
        if: ${{ steps.acc_secrets.outputs.has_secrets == 'true' }}
        env:
          SPACESHIP_API_KEY: ${{ secrets.SPACESHIP_API_KEY }}
          SPACESHIP_API_SECRET: ${{ secrets.SPACESHIP_API_SECRET }}
          SPACESHIP_TEST_DOMAIN: ${{ vars.SPACESHIP_TEST_DOMAIN }}
        run: make testacc

  security:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Trivy vuln + misconfig + secret scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          format: table
          cache: "true"

      - name: Generate CycloneDX SBOM
        if: ${{ !cancelled() }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json
          cache: "true"

      - name: Upload SBOM artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90
